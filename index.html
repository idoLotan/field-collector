<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="מאסף שדה" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>מאסף שדה</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #splash {
      position: fixed; inset: 0;
      background: #1d4ed8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.45s ease;
      user-select: none; -webkit-user-select: none;
    }
    .sp-sign {
      width: 120px; height: 120px;
      margin-bottom: 28px;
      animation: spPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes spPop {
      0%   { transform: scale(0.15); opacity: 0; }
      100% { transform: scale(1);    opacity: 1; }
    }
    .sp-ring {
      stroke-dasharray: 339;
      stroke-dashoffset: 339;
      animation: spRing 0.8s ease 0.15s forwards;
    }
    @keyframes spRing {
      to { stroke-dashoffset: 0; }
    }
    .sp-title {
      color: #fff; margin: 0 0 6px;
      font-size: 2rem; font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      animation: spUp 0.5s ease 0.45s both;
    }
    .sp-sub {
      color: rgba(255,255,255,0.65); margin: 0 0 44px;
      font-size: 0.9rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      animation: spUp 0.5s ease 0.6s both;
    }
    @keyframes spUp {
      0%   { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .sp-dots { display: flex; gap: 9px; animation: spUp 0.5s ease 0.75s both; }
    .sp-dots span {
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(255,255,255,0.55);
      animation: spDot 1.3s ease-in-out infinite;
    }
    .sp-dots span:nth-child(2) { animation-delay: 0.22s; }
    .sp-dots span:nth-child(3) { animation-delay: 0.44s; }
    @keyframes spDot {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
      40%           { transform: scale(1);    opacity: 1; }
    }
  </style>
  </head>
  <body>
    <div id="splash">
      <div class="sp-sign">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- outer glow ring -->
          <circle cx="50" cy="50" r="47" fill="rgba(255,255,255,0.12)"/>
          <!-- animated border ring -->
          <circle cx="50" cy="50" r="47" fill="none"
                  stroke="white" stroke-width="5" class="sp-ring"/>
          <!-- white disc -->
          <circle cx="50" cy="50" r="40" fill="white"/>
          <!-- blue upward arrow inside -->
          <path d="M36 72 L36 49 L26 49 L50 21 L74 49 L64 49 L64 72 Z" fill="#1d4ed8"/>
        </svg>
      </div>
      <h1 class="sp-title">מאסף שדה</h1>
      <p class="sp-sub">ניהול תמרורים ורשומות</p>
      <div class="sp-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
